<section class="photo-section my-120">
    <div class="container">
        <div class="section-heading style-center wow fadeInUp" data-wow-delay="0.2s">
            <div class="section-heading-content">
                <p class="section-heading-name">
                    Trending Photos
                </p>
                <h2 class="section-heading-text h4">
                    Discover trending <span class="highlight">
                        photo categories
                    </span> and support creators through real ratings and reviews.
                </h2>
            </div>
        </div>
        <div class="photo-wrapper">
            @@for(let i = 20; i > 0; i--){
            <div class="photo-item wow fadeInUp" data-wow-delay="0.2s">
                <div class="photo-item-wrapper">
                    <a href="photo-details.html" class="photo-item-thumb">
                        <img src="assets/images/photos/`+i+`.png" alt="img">
                    </a>
                    <div class="photo-item-content">
                        <a href="" class="photo-item-author">
                            <span class="thumb">
                                <img src="assets/images/clients/2.png" alt="img">
                            </span>
                            <span class="name">Matteo Milan</span>
                        </a>
                        <div class="photo-item-rating">
                            <span class="average">4.9</span>
                            <span class="icon">
                                <i class="fa-solid fa-star"></i>
                            </span>
                            <span class="count">(20)</span>
                        </div>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
