<!--========================== Testimonials Section Start ==========================-->

<section class="testimonials my-120">
    <div class=" container">
        <div class="section-heading style-center wow fadeInUp" data-wow-delay="0.2s">
            <div class="section-heading-content">
                <p class="section-heading-name"> Testimonials </p>
                <h2 class="section-heading-text h4">
                    See what our <span class="highlight">
                        community members
                    </span> are saying about their experience.
                </h2>
            </div>
        </div>
        <div class="testimonial-slider wow fadeInDown" data-wow-delay="0.2s">
            @@for(let i = 5; i > 0; i --){
            <div class="testimonial-item">
                <div class="testimonial-item__header">
                    Luminex <span class="date">/ Nov 22, 2025</span>
                </div>
                <div class="testimonial-item__body">
                    <div class="testimonial-item__auth">
                        <div class="testimonial-item__auth-thumb">
                            <img src="assets/images/team/`+i+`.png" alt="img">
                        </div>
                        <div class="testimonial-item__auth-content">
                            <p class="testimonial-item__auth-name">Emma Collins</p>
                            <p class="testimonial-item__auth-designation">Startup Founder</p>
                        </div>
                    </div>
                    <p class="testimonial-item__desc">
                        As someone with zero coding experience, I was worried about building my website. But this
                        template
                        made it so Simple
                    </p>
                </div>
            </div>
            }
        </div>
    </div>
</section>

<!--========================== Testimonials Section End ==========================-->
