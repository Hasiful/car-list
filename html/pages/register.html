@@include('../layout/_template-top.html')
<main>
    <div class="account-section">
        <div class="account-content">
            <form action="#" class="account-form lg-style">
                <div class="account-form-header">
                    <a href="index.html" class="account-form-logo">
                        <img src="assets/images/logo/logo.png" alt="Logo">
                    </a>
                    <h5 class="account-form-title">Welcome To Photorate</h5>
                </div>

                <div class="social-auth mb-4">
                    <ul class="social-auth__list mb-4">
                        <li class="social-auth__item">
                            <a href="" class="social-auth__link">
                                <img src="assets/images/social/google.png" alt="img">
                                Login With Google
                            </a>
                        </li>
                        <li class="social-auth__item">
                            <a href="" class="social-auth__link">
                                <img src="assets/images/social/fb.png" alt="img">
                                Login With Facebook
                            </a>
                        </li>
                    </ul>

                    <div class="social-auth__divide">
                        <span>OR</span>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label for="username" class="form--label">Username</label>
                            <input id="username" class="form--control md-style" placeholder="Username" type="text">
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label for="email" class="form--label">Email</label>
                            <input id="email" class="form--control md-style" placeholder="Email" type="text">
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label class="form--label">Country</label>
                            <select class="form--control select2">
                                <option value="">Bangladesh</option>
                                <option value="">Paksitan</option>
                                <option value="">Srilanka</option>
                                <option value="">Nepal</option>
                                <option value="">China</option>
                                <option value="">America</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label class="form--label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text">+088</span>
                                <input type="email" class="form-control form--control md-style" id="phone"
                                    placeholder="000 - 000 -000">
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label for="password" class="form--label">Password</label>
                            <div class="position-relative">
                                <input id="password" type="password" class="form--control md-style"
                                    placeholder="Enter password">
                                <span class="password-show-hide fas fa-eye toggle-password fa-eye-slash"
                                    id="#password"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-12 col-xl-6">
                        <div class="form-group">
                            <label for="confirm-password" class="form--label">Confirm Password</label>
                            <div class="position-relative">
                                <input id="confirm-password" type="password" class="form--control md-style"
                                    placeholder="Enter password">
                                <span class="password-show-hide fas fa-eye toggle-password fa-eye-slash"
                                    id="#confirm-password"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form--check">
                        <input class="form-check-input" type="checkbox" value="" id="remember">
                        <div class="form-check-label ms-2">
                            <label class="" for="remember">
                                I agree with all <a href="" class="text--base">Terms of service</a> and
                                <a href="" class="text--base">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn--base btn--md w-100">Sign In Account</button>

                <p class="account-external text-center mt-4">If you have on account already?
                    <a href="login.html" class="text--base">Sign in now</a>
                </p>
            </form>
        </div>
        <div class="account-left">
            <div class="account-left__thumb">
                <img class="fit-image" src="assets/images/thumbs/login.webp" alt="img">
            </div>
        </div>
    </div>
</main>
@@include('../layout/_template-bottom.html')
