<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title -->
  <title> AI Presentation And Documentation </title>
  <!-- Favicon -->
  <link rel="shortcut icon" href="assets/images/logo/favicon.png">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <!-- Fontasosome -->
  <link rel="stylesheet" href="assets/css/fontasosome.min.css">
  <!-- Slick -->
  <link rel="stylesheet" href="assets/css/slick.css">
  <!-- line awesome -->
  <link rel="stylesheet" href="assets/css/line-awesome.min.css">
  <!-- Odometer -->
  <link rel="stylesheet" href="assets/css/odometer.css">
  <!-- select2 -->
  <link rel="stylesheet" href="assets/css/select2.min.css">
  <!-- wow -->
  <link rel="stylesheet" href="assets/css/animate.css">
  <!-- Main css -->
  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
  <!--==================== Preloader Start ====================-->
<div class="preloader">
    <div class="loader-p"></div>
</div>
<!--==================== Preloader End ====================-->
  <!--==================== Overlay Start ====================-->
  <div class="body-overlay"></div>
  <!--==================== Overlay End ====================-->

  <!--==================== Sidebar Overlay End ====================-->
  <div class="sidebar-overlay"></div>
  <!--==================== Sidebar Overlay End ====================-->

  <!-- ==================== Scroll to Top End Here ==================== -->
  <a class="scroll-top"><i class="fas fa-angle-up"></i></a>
  <!-- ==================== Scroll to Top End Here ==================== -->

<main>
    <div class="account-section">
        <div class="account-content">
            <form action="#" class="account-form">
                <div class="account-form-header">
                    <a href="index.html" class="account-form-logo">
                        <img src="assets/images/logo/logo.png" alt="Logo">
                    </a>
                    <h5 class="account-form-title">Welcome To Photorate</h5>
                </div>

                <div class="social-auth mb-4">
                    <ul class="social-auth__list mb-4">
                        <li class="social-auth__item">
                            <a href="" class="social-auth__link">
                                <img src="assets/images/social/google.png" alt="img">
                                Login With Google
                            </a>
                        </li>
                        <li class="social-auth__item">
                            <a href="" class="social-auth__link">
                                <img src="assets/images/social/fb.png" alt="img">
                                Login With Facebook
                            </a>
                        </li>
                    </ul>

                    <div class="social-auth__divide">
                        <span>OR</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username" class="form--label">Username</label>
                    <input id="username" class="form--control md-style" placeholder="Username" type="text">
                </div>

                <div class="form-group">
                    <label for="password" class="form--label">Password</label>
                    <div class="position-relative">
                        <input id="password" type="password" class="form--control md-style"
                            placeholder="Enter password">
                        <span class="password-show-hide fas fa-eye toggle-password fa-eye-slash" id="#password"></span>
                    </div>
                </div>

                <div class="flex-between mb-4">
                    <div class="form--check gap-2">
                        <input class="form-check-input" type="checkbox" value="" id="remember">
                        <div class="form-check-label">
                            <label class="" for="remember">Remember Me</label>
                        </div>
                    </div>
                    <a href="register.html" class="forgot-password">Forget Password?</a>
                </div>

                <button type="submit" class="btn btn--md btn--base w-100">Sign In Account</button>

                <p class="account-external text-center mt-4">Don't Have On Account Yet?
                    <a href="register.html" class="text--base">Create Account</a>
                </p>
            </form>
        </div>
        <div class="account-left">
            <div class="account-left__thumb">
                <video class="fit-image" muted loop autoplay src="assets/images/thumbs/banner.mp4"></video>
            </div>
        </div>
    </div>
</main>
<!-- Footer -->
<!-- Jquery js -->
<script src="assets/js/jquery-3.7.1.min.js"></script>
<!-- Bootstrap Bundle Js -->
<script src="assets/js/boostrap.bundle.min.js"></script>
<!-- Slick js -->
<script src="assets/js/slick.min.js"></script>
<!-- Odometer js -->
<script src="assets/js/odometer.min.js"></script>
<!-- Viewport js -->
<script src="assets/js/viewport.jquery.js"></script>
<!-- select2 -->
<script src="assets/js/select2.min.js"></script>
<!-- range slider -->
<script src="assets/js/jquery-ui.min.js"></script>
<!-- wow -->
<script src="assets/js/wow.min.js"></script>
<!-- main js -->
<script src="assets/js/main.js"></script>
</body>

</html>
